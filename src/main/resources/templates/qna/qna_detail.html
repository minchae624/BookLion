<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>책 먹는 사자 - Q&A 상세</title>
	<link rel="stylesheet" href="css/style.css" />
</head>

<body>
	<header class="home-header">
		<a href="/api/home">
		  <img src="/img/linklogo.png" alt="홈으로" class="linklogo">
		</a>
		<div class="home-user-info">
			<span id="welcome-msg">환영합니다. 님</span>
			<div class="home-nav-buttons">
				<a href="main.html" class="btn btn-secondary" id="logout-btn">로그아웃</a>
				<a href="mypage.html" class="btn btn-secondary" id="mypage-btn">마이페이지</a>
			</div>
		</div>
	</header>

	<main class="review-detail-container">
		<h3 id="question-title">제목</h3>
		<div style="margin: 1rem 0;" id="question-meta"></div>
		<div id="question-content" style="padding: 1rem; background-color: #eee; border-radius: 6px; margin-bottom: 1.5rem; line-height: 1.6;"></div>

		<p style="text-align: right; font-size: 0.9rem;">
			<a href="#" style="margin-right: 1rem;">수정</a>
			<a href="#" style="color: red;">삭제</a>
		</p>

		<hr style="margin: 2rem 0;" />
		<div style="background-color: #eee; padding: 1rem; margin-top: 2rem; border-radius: 6px;">
			<p style="text-align: right; font-size: 0.9rem;">수정 &nbsp;&nbsp;&nbsp; 삭제</p>
			<p><strong>멋쟁이 호랑이</strong></p>
			<p>저도 사실 잘 모름</p>
			<p style="text-align: right; font-size: 0.9rem;">2025.06.24</p>
		</div>

		<div style="margin-top: 2rem;">
			<label for="new-comment"><strong>댓글 작성</strong></label>
			<textarea id="new-comment" rows="5" class="input-field" placeholder="댓글을 입력하세요."></textarea>
			<div style="text-align: right; margin-top: 0.5rem;">
				<a href="#" class="btn btn-blue">등록</a>
			</div>
		</div>
	</main>

	<script>
		document.addEventListener("DOMContentLoaded", () => {
			fetch("/api/users/me")
				.then(res => res.json())
				.then(user => {
					document.getElementById("welcome-msg").textContent = `환영합니다. ${user.username} 님`;
				})
				.catch(err => {
					console.error("사용자 정보 불러오기 실패:", err);
				});
		});
	</script>

	<script src="frontshared.js"></script>
	<script src="detail.js"></script>
</body>

</html>
